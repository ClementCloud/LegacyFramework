<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sunshine Trust - Interactive Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; overflow-x: hidden; }
    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
    .header { text-align: center; padding: 20px; color: white; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .header p { font-size: 16px; opacity: 0.95; }
    .page-nav { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
    .page-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; font-size: 18px; }
    .page-icon:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
    .page-icon.active { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); transform: scale(1.2); box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
    .navigation { display: flex; gap: 15px; margin-bottom: 20px; justify-content: space-between; align-items: center; }
    .nav-btn { padding: 12px 30px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: rgba(255,255,255,0.9); color: #333; }
    .nav-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-prev { background: rgba(255,255,255,0.9); color: #666; }
    .btn-next { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #1a1a1a; }
    .btn-finish { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; }
    .progress-container { background: rgba(255,255,255,0.2); height: 8px; border-radius: 10px; margin-bottom: 10px; overflow: hidden; backdrop-filter: blur(10px); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%); width: 0%; transition: width 0.5s ease; border-radius: 10px; }
    .progress-text { text-align: center; color: white; font-size: 14px; font-weight: 600; margin-bottom: 20px; opacity: 0.9; }
    .content-area { flex: 1; display: flex; align-items: center; justify-content: center; }
    .step-container { background: white; border-radius: 20px; padding: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 900px; width: 100%; min-height: 500px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .step-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #FFD700 0%, #FFA500 100%); }
    .step-header { margin-bottom: 30px; }
    .step-number { font-size: 14px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .step-title { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; color: #1a1a1a; margin-bottom: 15px; line-height: 1.2; }
    .step-subtitle { font-size: 18px; color: #666; font-weight: 500; }
    .step-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .info-card { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); padding: 25px; border-radius: 15px; border-left: 5px solid #FFD700; }
    .info-card h3 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    .info-card p { font-size: 16px; color: #666; line-height: 1.6; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
    .stat-card { background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #FFD700; transition: transform 0.3s, box-shadow 0.3s; }
    .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .stat-value { font-size: 36px; font-weight: 900; color: #FFD700; margin-bottom: 8px; }
    .stat-label { font-size: 14px; font-weight: 600; color: #666; line-height: 1.3; }
    .feature-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 12px; color: white; transition: transform 0.3s; }
    .feature-card:hover { transform: scale(1.03); }
    .feature-icon { font-size: 48px; margin-bottom: 15px; }
    .feature-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .feature-desc { font-size: 14px; opacity: 0.95; line-height: 1.5; }
    .feature-list { list-style: none; margin-top: 15px; }
    .feature-list li { font-size: 14px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .feature-list li:last-child { border-bottom: none; }
    .tier-card { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); padding: 20px; border-radius: 12px; text-align: center; color: white; transition: transform 0.3s; }
    .tier-card:hover { transform: scale(1.05); }
    .tier-number { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .tier-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .tier-allocation { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
    .tier-label { font-size: 12px; opacity: 0.9; }
    .score-card { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); padding: 25px; border-radius: 12px; text-align: center; color: white; transition: transform 0.3s; }
    .score-card:hover { transform: scale(1.05); }
    .score-percentage { font-size: 48px; font-weight: 900; margin-bottom: 10px; }
    .score-name { font-size: 16px; font-weight: 700; }
    .highlight-box { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); padding: 30px; border-radius: 15px; text-align: center; color: #1a1a1a; }
    .highlight-box h3 { font-size: 28px; font-weight: 800; margin-bottom: 15px; }
    .highlight-box p { font-size: 18px; font-weight: 500; line-height: 1.6; }
    .value-list { display: flex; flex-direction: column; gap: 12px; }
    .value-item { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); padding: 18px 25px; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 15px; transition: transform 0.3s; }
    .value-item:hover { transform: translateX(10px); }
    .value-icon { font-size: 28px; }
    .diagram-container { background: #f8f9fa; padding: 30px; border-radius: 15px; }
    .diagram-title { font-size: 24px; font-weight: 800; color: #1a1a1a; text-align: center; margin-bottom: 30px; }
    .flow-diagram { display: flex; flex-direction: column; gap: 20px; }
    .flow-row { display: flex; justify-content: center; align-items: center; gap: 15px; }
    .flow-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; min-width: 200px; border: 3px solid #FFD700; }
    .flow-box.governance { border-color: #667eea; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .flow-box.allocation { border-color: #43e97b; background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; }
    .flow-box.pillar { border-color: #f093fb; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; min-width: 150px; }
    .flow-box-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .flow-box-value { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
    .flow-box-desc { font-size: 12px; opacity: 0.9; }
    .arrow-down { width: 3px; height: 30px; background: linear-gradient(to bottom, #FFD700, #667eea); margin: 0 auto; }
    .arrow-split { display: flex; justify-content: center; gap: 30px; position: relative; }
    .arrow-split::before { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 3px; height: 15px; background: #43e97b; }
    .arrow-split-line { width: 3px; height: 30px; background: #f093fb; }
    .example-box { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
    .example-title { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 20px; text-align: center; }
    .tier-breakdown { display: flex; flex-direction: column; gap: 12px; }
    .tier-example { background: white; padding: 18px; border-radius: 12px; border-left: 5px solid #4facfe; }
    .tier-example-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .tier-example-name { font-size: 18px; font-weight: 700; color: #4facfe; }
    .tier-example-percent { font-size: 20px; font-weight: 800; color: #1a1a1a; }
    .tier-example-calc { font-size: 14px; color: #666; margin-bottom: 8px; }
    .tier-example-result { font-size: 22px; font-weight: 800; color: #43e97b; }
    .welcome-screen { text-align: center; padding: 50px; }
    .welcome-icon { font-size: 100px; margin-bottom: 30px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .welcome-title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900; color: #1a1a1a; margin-bottom: 20px; line-height: 1.2; }
    .welcome-subtitle { font-size: 20px; color: #666; margin-bottom: 40px; line-height: 1.6; }
    .start-btn { padding: 20px 50px; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #1a1a1a; border: none; border-radius: 12px; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 25px rgba(255,215,0,0.3); transition: all 0.3s; }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255,215,0,0.4); }
    .completion-screen { text-align: center; padding: 50px; }
    .completion-icon { font-size: 100px; margin-bottom: 30px; }
    .completion-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; color: #1a1a1a; margin-bottom: 20px; }
    .completion-text { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.6; }
    .completion-actions { display: flex; gap: 15px; justify-content: center; }
    .action-btn { padding: 15px 30px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .restart-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .download-btn { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; }
    @media (max-width: 768px) {
      .header h1 { font-size: 32px; }
      .step-container { padding: 30px 25px; min-height: 400px; }
      .step-title { font-size: 32px; }
      .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
      .navigation { flex-direction: row; }
      .welcome-title { font-size: 36px; }
      .page-nav { gap: 5px; }
      .page-icon { width: 35px; height: 35px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>☀️ The Sunshine Trust</h1>
      <p>Interactive Framework Guide</p>
    </div>
    <div class="page-nav" id="pageNav"></div>
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Ready to begin</div>
    <div class="navigation" id="topNav" style="display:none;">
      <button class="nav-btn btn-prev" onclick="app.prev()">← Previous</button>
      <button class="nav-btn btn-next" onclick="app.next()">Next →</button>
    </div>
    <div class="content-area"><div class="step-container" id="stepContainer"></div></div>
  </div>
  <script>
    const app={currentStep:0,icons:['☀️','🏛️','⚖️','💰','🏆','📊','🎁','🎉','🚀','💎','🔄','💸','👥','📖','✅'],steps:[{type:"welcome",html:'<div class="welcome-screen"><div class="welcome-icon">☀️</div><h1 class="welcome-title">Welcome to<br>The Sunshine Trust</h1><p class="welcome-subtitle">A guided tour through our family\'s multi-generational wealth framework.<br><br>This interactive experience will show you exactly how the Trust works,<br>how you benefit, and what you can do to maximize your participation.</p><button class="start-btn" onclick="app.next()">Begin Your Journey →</button></div>'},{num:"Step 1",title:"The Foundation",sub:"Protected Principal + Conservative Growth",html:'<div class="step-content"><div class="highlight-box"><h3>The Core Principle</h3><p>Principal is <strong>sacred and protected</strong>. We only distribute the yield it generates.</p></div><div class="grid-3"><div class="stat-card"><div class="stat-value">$6M</div><div class="stat-label">Example Trust Corpus</div></div><div class="stat-card"><div class="stat-value">4%</div><div class="stat-label">Conservative Annual Yield</div></div><div class="stat-card"><div class="stat-value">$240K</div><div class="stat-label">Annual Distribution Pool</div></div></div><div class="info-card"><h3>💡 What This Means for You</h3><p>The Trust grows forever while providing annual benefits to family members. You benefit today, and your children benefit tomorrow.</p></div></div>'},{num:"Step 2",title:"Who's in Charge?",sub:"Governance Structure",html:'<div class="step-content"><div class="grid-3"><div class="feature-card"><div class="feature-icon">⚖️</div><div class="feature-title">Independent Trustee</div><div class="feature-desc">Non-family professional with veto power on major decisions</div></div><div class="feature-card"><div class="feature-icon">👥</div><div class="feature-title">Family Trustee #1</div><div class="feature-desc">3-year term, represents family interests</div></div><div class="feature-card"><div class="feature-icon">👥</div><div class="feature-title">Family Trustee #2</div><div class="feature-desc">3-year term, rotates as Summit Chair</div></div></div><div class="info-card"><h3>🛡️ Protection & Fairness</h3><p>The Independent Trustee ensures decisions are fair and protects the principal from being raided. All major changes require unanimous agreement including the Independent Trustee.</p></div></div>'},{num:"Step 3",title:"Where the Money Goes",sub:"Annual Yield Allocation (60-20-10-10)",html:'<div class="step-content"><div class="grid-4"><div class="stat-card"><div class="stat-value">60%</div><div class="stat-label">Tier Distribution Pool</div></div><div class="stat-card"><div class="stat-value">20%</div><div class="stat-label">Growth Reserve</div></div><div class="stat-card"><div class="stat-value">10%</div><div class="stat-label">Family Bank</div></div><div class="stat-card"><div class="stat-value">10%</div><div class="stat-label">Admin & Summit</div></div></div><div class="info-card"><h3>📊 Example Breakdown ($240K Annual Yield)</h3><p><strong>$144K</strong> → Distributed to family based on tier<br><strong>$48K</strong> → Reinvested + insurance premiums<br><strong>$24K</strong> → Available for family loans<br><strong>$24K</strong> → Operations + annual summit</p></div></div>'},{num:"Step 4",title:"The Five Tiers",sub:"Performance-Based Distribution System",html:'<div class="step-content"><div class="grid-5"><div class="tier-card"><div class="tier-number">5</div><div class="tier-name">💎 PILLAR</div><div class="tier-allocation">35%</div><div class="tier-label">of pool</div></div><div class="tier-card"><div class="tier-number">4</div><div class="tier-name">🏛️ ARCHITECT</div><div class="tier-allocation">25%</div><div class="tier-label">of pool</div></div><div class="tier-card"><div class="tier-number">3</div><div class="tier-name">🌟 STEWARD</div><div class="tier-allocation">20%</div><div class="tier-label">of pool</div></div><div class="tier-card"><div class="tier-number">2</div><div class="tier-name">🔨 BUILDER</div><div class="tier-allocation">15%</div><div class="tier-label">of pool</div></div><div class="tier-card"><div class="tier-number">1</div><div class="tier-name">🌱 FOUNDATION</div><div class="tier-allocation">5%</div><div class="tier-label">of pool</div></div></div><div class="info-card"><h3>🎯 How It Works</h3><p>Higher tier = larger share of the 60% distribution pool. Tiers are reviewed every 6 months based on your performance. <strong>Completely confidential</strong> — no public rankings or comparisons.</p></div></div>'},{num:"Step 5",title:"How You're Scored",sub:"Weighted Performance Criteria",html:'<div class="step-content"><div class="grid-4"><div class="score-card"><div class="score-percentage">40%</div><div class="score-name">Financial Stability</div></div><div class="score-card"><div class="score-percentage">30%</div><div class="score-name">Productivity</div></div><div class="score-card"><div class="score-percentage">20%</div><div class="score-name">Reinvestment</div></div><div class="score-card"><div class="score-percentage">10%</div><div class="score-name">Contribution</div></div></div><div class="info-card"><h3>✅ Key Points</h3><p><strong>Voluntary:</strong> You choose to participate<br><strong>Confidential:</strong> Only you and trustees know your score<br><strong>Fair:</strong> Same criteria for everyone<br><strong>Semi-Annual:</strong> Reviewed every 6 months</p></div></div>'},{num:"Step 6",title:"The Four Pillars of Benefit",sub:"How the Trust Helps You",html:'<div class="step-content"><div class="grid-2"><div class="feature-card"><div class="feature-icon">🏆</div><div class="feature-title">Tier Distributions</div><ul class="feature-list"><li>✓ Performance-based rewards</li><li>✓ Annual cash distributions</li><li>✓ Higher tier = more money</li></ul></div><div class="feature-card"><div class="feature-icon">🏦</div><div class="feature-title">Family Bank</div><ul class="feature-list"><li>✓ Education loans</li><li>✓ Housing down payments</li><li>✓ Business capital</li><li>✓ Emergency liquidity</li></ul></div><div class="feature-card"><div class="feature-icon">🚀</div><div class="feature-title">Insurance Multiplier</div><ul class="feature-list"><li>✓ Trust funds life insurance</li><li>✓ 5-10x your income</li><li>✓ Boost your tier score</li><li>✓ Strengthen future generations</li></ul></div><div class="feature-card"><div class="feature-icon">🎉</div><div class="feature-title">Family Summit</div><ul class="feature-list"><li>✓ Annual family gathering</li><li>✓ Financial education</li><li>✓ Relationship building</li><li>✓ All expenses covered</li></ul></div></div></div>'},{num:"Step 7",title:"Annual Family Summit",sub:"Align, Educate, and Strengthen Together",html:'<div class="step-content"><div class="highlight-box"><h3>The Purpose</h3><p>The Family Capital Summit exists to <strong>align, educate, and strengthen the family</strong>. It reinforces the principles of stewardship, growth, contribution, and unity.<br><br>The Summit is <strong>not about comparison</strong>. It is about <strong>collective elevation</strong>.</p></div><div class="grid-2"><div class="info-card"><h3>📅 Summit Agenda</h3><p><strong>• Annual Performance Report</strong><br>Review Trust health and growth<br><br><strong>• Financial Education Workshop</strong><br>Learn strategies to improve tier standing<br><br><strong>• Governance Update</strong><br>Transparency on Trust decisions<br><br><strong>• Family Building Activity</strong><br>Strengthen relationships and unity</p></div><div class="info-card"><h3>💰 How It\'s Funded</h3><p><strong>Source:</strong> 10% Admin & Governance allocation<br><br><strong>Covers:</strong><br>• Venue and accommodations<br>• Meals and refreshments<br>• Educational materials<br>• Activities and entertainment<br>• All family expenses<br><br><strong>Cost to you:</strong> $0</p></div></div><div class="info-card"><h3>👥 Summit Leadership</h3><p><strong>Summit Chair:</strong> Rotates annually among Family Trustees<br><strong>Oversight:</strong> Independent Trustee ensures compliance and reporting<br><strong>Frequency:</strong> Once per year<br><strong>Attendance:</strong> All eligible beneficiaries invited</p></div></div>'},{num:"Step 8",title:"Insurance Multiplier",sub:"Optional Program to Supercharge the Trust",html:'<div class="step-content"><div class="highlight-box"><h3>How It Works</h3><p>Trust pays for life insurance on you (5-10x your income). When you pass, Trust receives the payout, strengthening capital for future generations. You get tier score boost today!</p></div><div class="grid-2"><div class="info-card"><h3>🎁 Your Benefits</h3><p>• +5% to +15% tier score boost<br>• No cost to you (Trust pays premiums)<br>• Strengthen family legacy<br>• Optional participation</p></div><div class="info-card"><h3>🚫 No Pressure</h3><p>• Completely voluntary<br>• No penalty for opting out<br>• Insurability issues = no impact<br>• Dignified choice</p></div></div><div class="info-card"><h3>💰 Bonus Structure</h3><p>Base participation: <strong>+5%</strong> | Policy ≥5x income: <strong>+7.5%</strong> | Policy ≥10x income: <strong>+10%</strong> | You fund ≥25% premium: <strong>+2.5%</strong> | You fund ≥50% premium: <strong>+5%</strong> | <strong>Total cap: +15%</strong></p></div></div>'},{num:"Step 9",title:"Our Core Values",sub:"The Cultural Foundation",html:'<div class="step-content"><div class="value-list"><div class="value-item"><span class="value-icon">🛡️</span><span>Principal is sacred and protected</span></div><div class="value-item"><span class="value-icon">🌾</span><span>Yield is earned through stewardship, not entitlement</span></div><div class="value-item"><span class="value-icon">🤝</span><span>Participation is voluntary and dignified</span></div><div class="value-item"><span class="value-icon">🚫</span><span>No entitlement mentality</span></div><div class="value-item"><span class="value-icon">🔒</span><span>No public comparisons or rankings</span></div><div class="value-item"><span class="value-icon">❤️</span><span>Unity is our #1 priority</span></div></div></div>'},{num:"Step 10",title:"Complete Workflow",sub:"How Everything Works Together",html:'<div class="step-content"><div class="diagram-container"><div class="diagram-title">☀️ The Sunshine Trust Architecture</div><div class="flow-diagram"><div class="flow-row"><div class="flow-box"><div class="flow-box-title">🏦 Trust Corpus</div><div class="flow-box-value">$6M</div><div class="flow-box-desc">Protected Principal</div></div></div><div class="arrow-down"></div><div class="flow-row"><div class="flow-box governance"><div class="flow-box-title">⚖️ Governance</div><div class="flow-box-desc">3 Trustees Oversee</div></div></div><div class="arrow-down"></div><div class="flow-row"><div class="flow-box"><div class="flow-box-title">📈 Annual Yield</div><div class="flow-box-value">4%</div><div class="flow-box-desc">$240K Generated</div></div></div><div class="arrow-down"></div><div class="flow-row"><div class="flow-box allocation"><div class="flow-box-title">💰 Allocation Split</div><div class="flow-box-desc">60-20-10-10 Model</div></div></div><div class="arrow-split"><div class="arrow-split-line"></div><div class="arrow-split-line"></div><div class="arrow-split-line"></div><div class="arrow-split-line"></div></div><div class="flow-row"><div class="flow-box pillar"><div class="flow-box-title">🏆</div><div class="flow-box-value">60%</div><div class="flow-box-desc">Tiers</div></div><div class="flow-box pillar"><div class="flow-box-title">📊</div><div class="flow-box-value">20%</div><div class="flow-box-desc">Growth</div></div><div class="flow-box pillar"><div class="flow-box-title">🏦</div><div class="flow-box-value">10%</div><div class="flow-box-desc">Bank</div></div><div class="flow-box pillar"><div class="flow-box-title">🎉</div><div class="flow-box-value">10%</div><div class="flow-box-desc">Admin</div></div></div></div></div><div class="info-card" style="margin-top: 20px;"><h3>🔄 The Complete Cycle</h3><p><strong>1.</strong> Principal generates yield annually<br><strong>2.</strong> Trustees govern distribution<br><strong>3.</strong> Yield allocated by 60-20-10-10<br><strong>4.</strong> Benefits flow to family<br><strong>5.</strong> Capital strengthens over time<br><strong>6.</strong> Future generations prosper</p></div></div>'},{num:"Step 11",title:"Tier Evaluation System",sub:"How Your Score Determines Your Distribution",html:'<div class="step-content"><div class="highlight-box"><h3>Annual Evaluation = 100 Points</h3><p>Members are evaluated across <strong>four categories</strong> to determine tier placement. All criteria are <strong>measurable and documented</strong>.</p></div><div class="grid-2"><div class="info-card"><h3>1️⃣ Financial Stability (40 pts)</h3><p><strong>Purpose:</strong> Ensure financial responsibility<br><br><strong>Minimum Eligibility (2 of 3):</strong><br>• Verified income source<br>• No debt delinquent >90 days<br>• Demonstrated savings behavior<br><br><strong>Scoring:</strong><br>• <strong>Consistent income 12+ mo (10 pts)</strong><br>&nbsp;&nbsp;→ W-2, 1099, or business tax return<br><br>• <strong>No high-interest debt (10 pts)</strong><br>&nbsp;&nbsp;→ Credit card balances >$1K @ >15% APR<br>&nbsp;&nbsp;→ Validated via credit report or statement<br><br>• <strong>3+ month emergency fund (10 pts)</strong><br>&nbsp;&nbsp;→ Bank/investment statements showing liquid assets ≥ 3x monthly expenses<br><br>• <strong>Positive net worth/YoY growth (10 pts)</strong><br>&nbsp;&nbsp;→ Self-reported balance sheet reviewed by committee</p></div><div class="info-card"><h3>2️⃣ Wealth Building (25 pts)</h3><p><strong>Purpose:</strong> Reward growth behavior<br><br><strong>Scoring:</strong><br>• <strong>Saves ≥10% of income (10 pts)</strong><br>&nbsp;&nbsp;→ Bank statements showing consistent transfers to savings/investment accounts<br><br>• <strong>Invests consistently (5 pts)</strong><br>&nbsp;&nbsp;→ 401k, IRA, brokerage statements showing contributions in ≥6 of last 12 months<br><br>• <strong>Net worth grows YoY (5 pts)</strong><br>&nbsp;&nbsp;→ Current vs prior year balance sheet comparison<br><br>• <strong>Appropriate insurance (5 pts)</strong><br>&nbsp;&nbsp;→ Health insurance: proof of coverage<br>&nbsp;&nbsp;→ Life insurance (if dependents): policy declaration showing coverage ≥ 5x income<br>&nbsp;&nbsp;→ Validated via insurance cards/declarations</p></div><div class="info-card"><h3>3️⃣ Family Contribution (20 pts)</h3><p><strong>Purpose:</strong> Reward ecosystem engagement<br><br><strong>Channels:</strong><br>• <strong>Attend annual summit (5 pts)</strong><br>&nbsp;&nbsp;→ Sign-in sheet at summit<br><br>• <strong>Serve on committee (5 pts)</strong><br>&nbsp;&nbsp;→ Trustee appointment letter + attendance record showing ≥75% meeting attendance<br><br>• <strong>Invest in trust ventures (5 pts)</strong><br>&nbsp;&nbsp;→ Investment ≥$2,500 in trustee-approved family business/venture<br>&nbsp;&nbsp;→ Validated via signed investment agreement + payment proof<br><br>• <strong>Host/teach at summit (5 pts)</strong><br>&nbsp;&nbsp;→ Delivered ≥30-min workshop/presentation at summit<br>&nbsp;&nbsp;→ Confirmed by Summit Chair<br><br>• <strong>Provide mentorship (3 pts)</strong><br>&nbsp;&nbsp;→ Documented ≥3 mentorship sessions with another family member<br>&nbsp;&nbsp;→ Both parties submit brief confirmation form<br><br>• <strong>Lead operations (5 pts)</strong><br>&nbsp;&nbsp;→ Chaired event, managed project, or led initiative approved by trustees<br>&nbsp;&nbsp;→ Confirmed by trustee oversight</p></div><div class="info-card"><h3>4️⃣ Character & Compliance (15 pts)</h3><p><strong>Purpose:</strong> Protect trust integrity<br><br><strong>Scoring:</strong><br>• <strong>Meets reporting requirements (5 pts)</strong><br>&nbsp;&nbsp;→ Submitted annual financial disclosure form by deadline (typically 30 days before evaluation)<br>&nbsp;&nbsp;→ Form includes: income verification, net worth statement, debt summary<br>&nbsp;&nbsp;→ Validated: trustee receipt confirmation<br><br>• <strong>No criminal/fraud convictions (5 pts)</strong><br>&nbsp;&nbsp;→ No felony convictions in past 7 years<br>&nbsp;&nbsp;→ No fraud, embezzlement, or financial crimes ever<br>&nbsp;&nbsp;→ Validated: annual background check OR self-certification with spot audits<br><br>• <strong>No policy violations (5 pts)</strong><br>&nbsp;&nbsp;→ No breach of trust confidentiality (discussing other members\' scores/finances publicly)<br>&nbsp;&nbsp;→ No threats, harassment, or abuse toward family/trustees<br>&nbsp;&nbsp;→ No misuse of Family Bank funds (late payments without trustee-approved extension)<br>&nbsp;&nbsp;→ Validated: trustee records + family member complaints log</p></div></div><div class="example-box" style="margin-top:20px;"><div class="example-title">📊 Score → Tier Assignment</div><div class="tier-breakdown"><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">💎 Tier 5: PILLAR</span><span class="tier-example-percent">90-100 pts</span></div><div class="tier-example-result">Exceptional performance across all areas</div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">🏛️ Tier 4: ARCHITECT</span><span class="tier-example-percent">80-89 pts</span></div><div class="tier-example-result">Strong performance with minor gaps</div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">🌟 Tier 3: STEWARD</span><span class="tier-example-percent">70-79 pts</span></div><div class="tier-example-result">Solid performance, room to improve</div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">🔨 Tier 2: BUILDER</span><span class="tier-example-percent">60-69 pts</span></div><div class="tier-example-result">Meeting expectations, building foundation</div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">🌱 Tier 1: FOUNDATION</span><span class="tier-example-percent">50-59 pts</span></div><div class="tier-example-result">Starting journey, showing promise</div></div></div></div><div class="info-card" style="margin-top:20px;"><h3>📋 Documentation Required</h3><p><strong>All members submit annually:</strong><br>• Tax return (W-2/1099/Schedule C)<br>• Bank/investment account statements (most recent)<br>• Credit report OR debt summary<br>• Insurance proof (health card + life policy if applicable)<br>• Participation log (summit attendance, contributions)<br><br><strong>Reviewed by:</strong> Independent Trustee + Evaluation Committee<br><strong>Deadline:</strong> 30 days before annual evaluation<br><strong>Privacy:</strong> Only trustees see documents; scores remain confidential</p></div></div>'},{num:"Step 12",title:"Real Examples",sub:"How Different Family Members Score",html:'<div class="step-content"><div class="highlight-box"><h3>Meet Your Family</h3><p>See how different situations translate to scores and distributions. <strong>All scenarios are confidential</strong> — only you and trustees see your actual score.</p></div><div style="display:flex;flex-direction:column;gap:25px;"><div class="example-box"><div class="example-title">👨‍💼 Chukwuemeka, Age 34 - Tier 4 (85 points)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 His Situation</h3><p>• Software engineer, $120K salary<br>• Saves 15% ($18K/year)<br>• $180K net worth<br>• Attended summit, mentored cousin<br>• Invested $5K in trust venture<br>• <strong>No insurance multiplier</strong></p></div><div class="info-card"><h3>🎯 His Score Breakdown</h3><p><strong>Financial Stability:</strong> 38/40<br><strong>Wealth Building:</strong> 23/25<br><strong>Family Contribution:</strong> 13/20<br><strong>Character/Compliance:</strong> 11/15<br><br><strong>Subtotal: 85/100</strong><br><strong>Insurance Bonus: +0%</strong><br><strong>Final Score: 85</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 4 = 25% of pool</span></div><div class="tier-example-calc">If he\'s the only Tier 4: $144K × 25% = $36K</div><div class="tier-example-result">Chukwuemeka receives $36,000 this year</div></div></div><div class="example-box"><div class="example-title">👩‍🎓 Mariana, Age 28 - Tier 3 (72 points → boosted from Tier 2!)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 Her Situation</h3><p>• Teacher, $52K salary<br>• Saves 8% ($4.2K/year)<br>• $15K net worth (student loans)<br>• Attended summit<br>• <strong>Insurance multiplier: Trust pays for $350K policy (≥5x income)</strong><br>• Mariana co-pays 30% of premium</p></div><div class="info-card"><h3>🎯 Her Score Breakdown</h3><p><strong>Financial Stability:</strong> 25/40<br><strong>Wealth Building:</strong> 16/25<br><strong>Family Contribution:</strong> 11/20<br><strong>Character/Compliance:</strong> 15/15<br><br><strong>Subtotal: 67/100</strong><br><strong>Insurance Bonus: +7.5%</strong><br>(5x policy = +7.5%, co-pay <50% = +0%)<br><strong>Final Score: 72 (Tier 3!)</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 3 = 20% of pool</span></div><div class="tier-example-calc">Insurance multiplier bumped her from Tier 2 to Tier 3!<br>$144K × 20% = $28.8K (vs $21.6K at Tier 2)</div><div class="tier-example-result">Mariana receives $28,800 this year (+$7,200 boost!)</div></div></div><div class="example-box"><div class="example-title">👨‍🔧 Adebayo, Age 45 - Tier 5 (94 points → maximized!)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 His Situation</h3><p>• Business owner, $180K income<br>• Saves 25% ($45K/year)<br>• $850K net worth<br>• Serves as Family Trustee<br>• Hosted financial workshop at summit<br>• <strong>Insurance multiplier: Trust pays for $1.8M policy (10x income)</strong><br>• Adebayo co-pays 50% of premium</p></div><div class="info-card"><h3>🎯 His Score Breakdown</h3><p><strong>Financial Stability:</strong> 40/40<br><strong>Wealth Building:</strong> 25/25<br><strong>Family Contribution:</strong> 19/20<br><strong>Character/Compliance:</strong> 10/15<br><br><strong>Subtotal: 94/100</strong><br><strong>Insurance Bonus: +15%</strong><br>(10x policy = +10%, 50% co-pay = +5%)<br><strong>Final Score: 100 (MAXED!)</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 5 = 35% of pool</span></div><div class="tier-example-calc">Perfect score! Insurance multiplier pushed him to 100/100<br>$144K × 35% = $50.4K</div><div class="tier-example-result">Adebayo receives $50,400 this year</div></div><div class="info-card" style="margin-top:15px;background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);border-left:5px solid #2ecc71;color:white;"><h3 style="color:white;">🚀 Insurance Multiplier Impact</h3><p style="color:white;">• Trust pays 50% of $1.8M policy premium (~$900/year)<br>• Adebayo pays 50% (~$900/year)<br>• He gets +15 points to his score (15% boost!)<br>• When he passes, Trust receives $1.8M to strengthen capital<br>• His family benefits from tier boost TODAY</p></div></div><div class="example-box"><div class="example-title">👩‍⚕️ Dr. Yemisi, Age 38 - Tier 3 (73 points)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 Her Situation</h3><p>• Physician, $220K salary<br>• High income but $180K student debt<br>• Saves 12% ($26K/year)<br>• Attended summit only<br>• Focused on debt paydown<br>• <strong>No insurance multiplier (opted out)</strong></p></div><div class="info-card"><h3>🎯 Her Score Breakdown</h3><p><strong>Financial Stability:</strong> 30/40<br><strong>Wealth Building:</strong> 20/25<br><strong>Family Contribution:</strong> 8/20<br><strong>Character/Compliance:</strong> 15/15<br><br><strong>Subtotal: 73/100</strong><br><strong>Insurance Bonus: +0%</strong><br><strong>Final Score: 73</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 3 = 20% of pool</span></div><div class="tier-example-calc">Highest income but Tier 3 due to debt & low engagement<br>$144K × 20% = $28.8K</div><div class="tier-example-result">Dr. Yemisi receives $28,800 this year</div></div></div><div class="example-box"><div class="example-title">👨‍💻 Carlos, Age 31 - Tier 4 (87 points → insurance boost!)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 His Situation</h3><p>• Product manager, $95K salary<br>• Saves 18% ($17K/year)<br>• $120K net worth<br>• Served on committee, attended summit<br>• Mentored 2 younger cousins<br>• <strong>Insurance multiplier: Trust pays for $950K policy (10x income)</strong><br>• Carlos pays 0% (Trust covers 100%)</p></div><div class="info-card"><h3>🎯 His Score Breakdown</h3><p><strong>Financial Stability:</strong> 35/40<br><strong>Wealth Building:</strong> 24/25<br><strong>Family Contribution:</strong> 18/20<br><strong>Character/Compliance:</strong> 10/15<br><br><strong>Subtotal: 87/100</strong><br><strong>Insurance Bonus: +10%</strong><br>(10x policy = +10%, 0% co-pay = +0%)<br><strong>Final Score: 96 (pushed to Tier 5!)</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 5 = 35% of pool</span></div><div class="tier-example-calc">Insurance multiplier moved him from Tier 4 to Tier 5!<br>$144K × 35% = $50.4K (vs $36K at Tier 4)</div><div class="tier-example-result">Carlos receives $50,400 this year (+$14,400 boost!)</div></div><div class="info-card" style="margin-top:15px;background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);border-left:5px solid #f39c12;"><h3>💡 Insurance Multiplier Lesson</h3><p>• Carlos was at 87 points (Tier 4)<br>• 10x income policy gave him +10 points → 97 total<br>• This pushed him into Tier 5 (90-100 range)<br>• Result: +$14,400 more per year<br>• Trust gets $950K when he passes to strengthen future generations</p></div></div><div class="example-box"><div class="example-title">👩‍🏫 Chiamaka, Age 42 - Tier 2 (65 points)</div><div class="grid-2" style="margin-bottom:15px;"><div class="info-card"><h3>📊 Her Situation</h3><p>• High school principal, $78K salary<br>• Saves 6% ($4.7K/year)<br>• $45K net worth<br>• Attended summit<br>• Supporting elderly parent<br>• <strong>No insurance multiplier (uninsurable due to health)</strong></p></div><div class="info-card"><h3>🎯 Her Score Breakdown</h3><p><strong>Financial Stability:</strong> 28/40<br><strong>Wealth Building:</strong> 15/25<br><strong>Family Contribution:</strong> 12/20<br><strong>Character/Compliance:</strong> 10/15<br><br><strong>Subtotal: 65/100</strong><br><strong>Insurance Bonus: +0%</strong><br>(Uninsurable = no penalty)<br><strong>Final Score: 65</strong></p></div></div><div class="tier-example"><div class="tier-example-header"><span class="tier-example-name">Annual Distribution</span><span class="tier-example-percent">Tier 2 = 15% of pool</span></div><div class="tier-example-calc">No penalty for being uninsurable<br>$144K × 15% = $21.6K</div><div class="tier-example-result">Chiamaka receives $21,600 this year</div></div></div></div><div class="info-card" style="margin-top:20px;"><h3>🔑 Key Insights</h3><p>• <strong>Income ≠ Tier:</strong> Dr. Yemisi earns most but ranks Tier 3<br>• <strong>Behavior matters:</strong> Chukwuemeka\'s engagement boosted him to Tier 4<br>• <strong>Insurance multiplier is powerful:</strong> Mariana jumped from Tier 2 → Tier 3, Carlos from Tier 4 → Tier 5<br>• <strong>No penalty for uninsurable:</strong> Chiamaka not penalized for health issues<br>• <strong>Co-pay increases bonus:</strong> Adebayo\'s 50% co-pay gave him maximum +15%<br>• <strong>Starting journey:</strong> Everyone receives meaningful support<br>• <strong>Growth mindset:</strong> Everyone can improve their tier next cycle</p></div></div>'},{num:"Step 13",title:"Terms to Know",sub:"Key Vocabulary & Abbreviations",html:'<div class="step-content"><div class="highlight-box"><h3>Trust Terminology Reference</h3><p>Understanding these terms will help you navigate the Trust framework with confidence.</p></div><div style="display:flex;flex-direction:column;gap:20px;"><div class="info-card"><h3>📊 Core Trust Terms</h3><p><strong>Principal / Corpus:</strong> The protected base capital of the Trust ($6M in our example). This amount is never distributed and remains invested to generate yield.<br><br><strong>Yield:</strong> Annual investment returns generated by the principal (target: 4% annually). This is what gets distributed to family members.<br><br><strong>Net Distributable Income (NDI):</strong> The total annual yield available for allocation after fees and expenses ($240K in our example).<br><br><strong>Tier:</strong> Your performance-based ranking (1-5) that determines your share of the distribution pool. Higher tier = larger distribution.<br><br><strong>Distribution Pool:</strong> The portion of NDI allocated to tier-based payouts (60% = $144K in our example).</p></div><div class="info-card"><h3>🏛️ Governance Terms</h3><p><strong>Trustee:</strong> A board member responsible for overseeing Trust operations, investments, and compliance. Our Trust has 3 trustees.<br><br><strong>Independent Trustee:</strong> A non-family professional trustee with veto power on major decisions. Ensures fairness and protects against conflicts of interest.<br><br><strong>Family Trustee:</strong> A family member elected to serve a 3-year term on the trustee board. We have 2 family trustee positions.<br><br><strong>Summit Chair:</strong> The family trustee responsible for organizing and hosting the annual Family Capital Summit. Rotates annually.<br><br><strong>Evaluation Committee:</strong> Group responsible for reviewing member submissions and assigning tier scores. Led by Independent Trustee.</p></div><div class="info-card"><h3>💰 Financial Terms</h3><p><strong>Growth Reserve:</strong> 20% of annual yield ($48K) set aside for Trust growth, reinvestment, and insurance premiums.<br><br><strong>Family Bank:</strong> 10% of annual yield ($24K) available as loans to family members for education, housing, business, or emergencies.<br><br><strong>Net Worth:</strong> Total assets minus total liabilities. Used to evaluate financial stability (Assets - Debts = Net Worth).<br><br><strong>Emergency Fund:</strong> Liquid savings equal to 3+ months of living expenses. Required for full Financial Stability points.<br><br><strong>High-Interest Debt:</strong> Credit card balances >$1,000 at >15% APR. Negatively impacts tier scoring.<br><br><strong>YoY (Year-over-Year):</strong> Comparison of this year\'s numbers to last year\'s numbers. Used to track net worth growth.</p></div><div class="info-card"><h3>🚀 Insurance Multiplier Terms</h3><p><strong>Insurance Multiplier:</strong> Optional program where Trust funds life insurance on members in exchange for tier score boost.<br><br><strong>Policy Face Value:</strong> The death benefit amount paid when the insured person passes (e.g., $1M policy = $1M paid to Trust).<br><br><strong>Premium:</strong> Annual cost to maintain the life insurance policy. Trust pays 50-100% depending on agreement.<br><br><strong>Co-Pay / Cost Share:</strong> Member\'s voluntary contribution toward insurance premium. Increases tier bonus (+2.5% for 25% co-pay, +5% for 50%+ co-pay).<br><br><strong>Coverage Ratio:</strong> Policy face value divided by annual income. 5x = minimum for bonus, 10x = maximum bonus.<br><br><strong>Insurability:</strong> Whether someone qualifies for life insurance based on health. Being uninsurable carries NO penalty.</p></div><div class="info-card"><h3>📋 Scoring & Evaluation Terms</h3><p><strong>Financial Stability (40 pts):</strong> Category measuring income consistency, debt management, savings, and net worth.<br><br><strong>Wealth Building (25 pts):</strong> Category measuring savings rate, investment discipline, and insurance coverage.<br><br><strong>Family Contribution (20 pts):</strong> Category measuring engagement through summit attendance, committee service, investments, and mentorship.<br><br><strong>Character & Compliance (15 pts):</strong> Category measuring adherence to reporting requirements and trust policies.<br><br><strong>Minimum Eligibility:</strong> Basic requirements that must be met to qualify for tier participation (2 of 3 criteria in Financial Stability).<br><br><strong>Tier Cap:</strong> Maximum tier achievable if certain conditions aren\'t met (e.g., failing minimum eligibility caps you at Tier 1).</p></div><div class="info-card"><h3>🎯 Program & Benefit Terms</h3><p><strong>Family Capital Summit:</strong> Annual gathering funded by Trust (10% of NDI) for education, relationship building, and governance updates.<br><br><strong>AFR (Applicable Federal Rate):</strong> IRS-published minimum interest rate for family loans. Family Bank loans must charge at least this rate.<br><br><strong>Balance Sheet:</strong> Financial statement showing assets, liabilities, and net worth. Required for annual evaluation.<br><br><strong>Confidential Scoring:</strong> Only you and trustees see your tier score. No public rankings or comparisons between family members.<br><br><strong>Semi-Annual Review:</strong> Tiers are evaluated every 6 months, allowing members to improve their standing twice per year.</p></div><div class="info-card"><h3>📝 Common Abbreviations</h3><p><strong>NDI:</strong> Net Distributable Income<br><strong>YoY:</strong> Year-over-Year<br><strong>APR:</strong> Annual Percentage Rate<br><strong>AFR:</strong> Applicable Federal Rate (IRS minimum)<br><strong>W-2:</strong> Employee wage and tax statement<br><strong>1099:</strong> Independent contractor income statement<br><strong>IRA:</strong> Individual Retirement Account<br><strong>401(k):</strong> Employer-sponsored retirement plan<br><strong>HSA:</strong> Health Savings Account<br><strong>IRS:</strong> Internal Revenue Service</p></div></div><div class="info-card" style="margin-top:20px;background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);border-left:5px solid #f39c12;"><h3>💡 Pro Tip</h3><p>Bookmark this page! You can reference these terms anytime you\'re reviewing Trust documents, preparing your annual submission, or discussing your tier strategy with trustees.</p></div></div>'},{type:"completion",html:'<div class="completion-screen"><div class="completion-icon">🎉</div><h1 class="completion-title">You\'re All Set!</h1><p class="completion-text">You now understand how The Sunshine Trust works and how you can benefit.<br><br>Ready to get started? Complete the financial literacy curriculum and sign your participation agreement.</p><div class="completion-actions"><button class="action-btn restart-btn" onclick="app.restart()">← Start Over</button><button class="action-btn download-btn" onclick="alert(\'Download feature coming soon!\')">Download Summary</button></div></div>'}],render(){const s=this.steps[this.currentStep],c=document.getElementById("stepContainer"),n=document.getElementById("topNav");if(s.type){c.innerHTML=s.html;n.style.display="none"}else{c.innerHTML=`<div class="step-header"><div class="step-number">${s.num}</div><h1 class="step-title">${s.title}</h1><p class="step-subtitle">${s.sub}</p></div>${s.html}`;n.style.display="flex";const prevBtn=n.querySelector(".btn-prev"),nextBtn=n.querySelector(".btn-next");prevBtn.disabled=this.currentStep<=1;nextBtn.className=this.currentStep===this.steps.length-1?"nav-btn btn-finish":"nav-btn btn-next";nextBtn.textContent=this.currentStep===this.steps.length-1?"Finish ✓":"Next →"}this.updateProgress();this.updatePageNav()},updateProgress(){const p=(this.currentStep/(this.steps.length-1))*100;document.getElementById("progressBar").style.width=p+"%";let t="";if(this.currentStep===0)t="Ready to begin";else if(this.currentStep===this.steps.length-1)t="Complete! 🎉";else{const n=this.steps.filter(x=>!x.type),i=n.indexOf(this.steps[this.currentStep]);t=`Step ${i+1} of ${n.length}`}document.getElementById("progressText").textContent=t},updatePageNav(){const nav=document.getElementById("pageNav");nav.innerHTML=this.steps.map((s,i)=>`<div class="page-icon ${i===this.currentStep?'active':''}" onclick="app.goTo(${i})" title="${s.num||s.type}">${this.icons[i]}</div>`).join("")},next(){if(this.currentStep<this.steps.length-1){this.currentStep++;this.render();window.scrollTo({top:0,behavior:"smooth"})}},prev(){if(this.currentStep>0){this.currentStep--;this.render();window.scrollTo({top:0,behavior:"smooth"})}},goTo(i){if(i>=0&&i<this.steps.length){this.currentStep=i;this.render();window.scrollTo({top:0,behavior:"smooth"})}},restart(){this.currentStep=0;this.render();window.scrollTo({top:0,behavior:"smooth"})}};if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",()=>app.render())}else{app.render()}
  </script>
